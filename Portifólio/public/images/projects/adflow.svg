  </defs>
  <rect width="1600" height="1000" fill="url(#adfbg)"/>
  <g transform="translate(1200 280)" opacity="0.55">
    <path d="M -240 240 C -240 80, 0 80, 0 240 C 0 400, 240 400, 240 240" stroke="#ec4899" stroke-width="3" fill="none"/>
    <path d="M -300 240 C -300 40, 60 40, 60 240 C 60 440, 360 440, 360 240" stroke="#ec4899" stroke-width="2" fill="none" opacity="0.4"/>
  </g>
  <g transform="translate(110 150)">
