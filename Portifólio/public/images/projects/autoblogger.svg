      <circle cx="80" cy="140" r="2"/><circle cx="140" cy="140" r="2"/><circle cx="200" cy="140" r="2"/><circle cx="260" cy="140" r="2"/><circle cx="320" cy="140" r="2"/>
      <circle cx="80" cy="200" r="2"/><circle cx="140" cy="200" r="2"/><circle cx="200" cy="200" r="2"/><circle cx="260" cy="200" r="2"/><circle cx="320" cy="200" r="2"/>
      <circle cx="80" cy="260" r="2"/><circle cx="140" cy="260" r="2"/><circle cx="200" cy="260" r="2"/>
    </g>
    <g transform="translate(1200 640)">
