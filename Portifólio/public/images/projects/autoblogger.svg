      <circle cx="0" cy="60" r="2"/><circle cx="60" cy="60" r="2"/><circle cx="120" cy="60" r="2"/><circle cx="180" cy="60" r="2"/><circle cx="240" cy="60" r="2"/><circle cx="300" cy="60" r="2"/>
      <circle cx="0" cy="120" r="2"/><circle cx="60" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="180" cy="120" r="2"/><circle cx="240" cy="120" r="2"/><circle cx="300" cy="120" r="2"/>
      <circle cx="0" cy="180" r="2"/><circle cx="60" cy="180" r="2"/><circle cx="120" cy="180" r="2"/>
    </g>
  </g>
  <g opacity="0.1" stroke="#0a0a0a" stroke-width="1">
    <line x1="0" y1="250" x2="1600" y2="250"/>
    <line x1="0" y1="500" x2="1600" y2="500"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
  </g>
  <g transform="translate(110 160)">
