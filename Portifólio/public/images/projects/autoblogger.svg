    <text x="0" y="460" font-family="Georgia, serif" font-weight="900" font-size="260" fill="#f97316" letter-spacing="-12" font-style="italic">Blogger.</text>
    <text x="0" y="590" font-family="Georgia, serif" font-size="38" fill="#171717">Artigos em escala. SEO validado.</text>
    <text x="0" y="638" font-family="Georgia, serif" font-size="38" fill="#171717" font-style="italic">Gera, agenda e publica sozinho.</text>
  </g>
  <g transform="translate(110 870)" opacity="0.9">
    <rect x="0" y="0" width="14" height="14" fill="#f97316"/>
    <text x="30" y="14" font-family="ui-monospace, monospace" font-size="18" fill="#737373" letter-spacing="4">GEMINI 2.5 FLASH // AUTOBLOGGER-ROSY.VERCEL.APP</text>
