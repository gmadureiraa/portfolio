<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-label="BugHunter cover">
  <rect width="1600" height="1000" fill="#0a0a0a"/>
  <g transform="translate(110 140)">
